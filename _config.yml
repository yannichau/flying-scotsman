# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Green skies and blue grass
email: z264interrailer@outlook.com
description: >- # this means to ignore newlines until "baseurl:"
  All about the world when the sky is green and the grass is blue.
url: "https://yannichau.github.io"
baseurl: "/flying-scotsman"

# twitter_username: jekyllrb
# github_username:  jekyll
# Social Media Links for Header
linkedin_url: "https://www.linkedin.com/in/yanni-chau-a52b61195"
github_url:   "https://github.com/yannichau"
youtube_url:  "http://www.youtube.com/@cluelessyanni5664"
medium_url:   "https://medium.com/@yannichau/about"

# Build settings
theme: minima
plugins:
  - jekyll-feed

kramdown:
  html_to_native: true

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
sass:
  quiet_deps: true

excerpt_separator: ""