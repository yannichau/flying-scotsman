<script>
document.addEventListener("DOMContentLoaded", function() {
  // Find all paragraphs containing multi-image galleries
  const galleries = document.querySelectorAll("p:has(img + img)");
  
  galleries.forEach(gallery => {
    const images = gallery.querySelectorAll("img");
    
    images.forEach(img => {
      // 1. Create a wrapper box to house the image + caption together
      const wrapper = document.createElement("div");
      wrapper.className = "gallery-item";
      
      // Calculate aspect ratio dynamically so flexbox knows how to size the column widths
      img.onload = function() {
        const ratio = img.naturalWidth / img.naturalHeight;
        wrapper.style.flexGrow = ratio; // Gives wider images more space naturally
      };
      // Trigger fallback if image is already cached
      if (img.complete) {
        const ratio = img.naturalWidth / img.naturalHeight;
        wrapper.style.flexGrow = ratio || 1;
      }

      // 2. Extract the hidden Alt string text
      const captionText = img.getAttribute("alt");
      
      // Put the image inside the wrapper
      img.parentNode.insertBefore(wrapper, img);
      wrapper.appendChild(img);
      
      // 3. If caption text exists, generate a visible element beneath the image
      if (captionText && captionText.trim() !== "") {
        const caption = document.createElement("span");
        caption.className = "custom-caption";
        caption.textContent = captionText;
        wrapper.appendChild(caption);
      }
    });
  });
});
</script>
